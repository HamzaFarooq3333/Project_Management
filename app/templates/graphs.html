<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Similarity & Differences Graphs</title>
	<link rel="stylesheet" href="/static/styles.css" />
	<script defer src="/static/graphs.js"></script>
</head>
<body>
	<header>
		<h1>Similarity & Differences</h1>
		<a href="/">← Back</a>
	</header>
	<main>
		<div class="row">
			<input id="graphsTopic" type="text" placeholder="Topic (e.g., Risk Management)" />
			<button id="graphsRunBtn">Load Graphs</button>
		</div>
		<div id="graphsLegend" class="muted"></div>
		<div class="row">
			<div class="card" style="flex:1">
				<h3>Similarities (Blue)</h3>
				<canvas id="canvasSimilar" width="500" height="350"></canvas>
			</div>
			<div class="card" style="flex:1">
				<h3>Differences (Red)</h3>
				<canvas id="canvasDifferent" width="500" height="350"></canvas>
			</div>
			<div class="card" style="flex:1">
				<h3>Unique (Purple)</h3>
				<canvas id="canvasUnique" width="500" height="350"></canvas>
			</div>
		</div>
	</main>
</body>
</html>
